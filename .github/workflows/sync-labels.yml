name: Sync labels

on:
  workflow_dispatch:
  push:
    paths:
      - .github/labels.yml
      - .github/workflows/sync-labels.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
